name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true
          components: clippy

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Rust clippy
        run: |
          cd backend
          cargo clippy -- -D warnings

      - name: Rust tests
        run: |
          cd backend
          cargo test

      - name: Install frontend deps
        run: |
          cd frontend
          npm ci || npm install --no-audit --no-fund

      - name: TypeScript type check
        run: |
          cd frontend
          npx tsc --noEmit

      - name: ESLint
        run: |
          cd frontend
          npm run lint

      - name: Frontend unit tests
        run: |
          cd frontend
          npm run test:unit

  e2e:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust deps (cargo fetch)
        run: cargo fetch --manifest-path backend/Cargo.toml

      - name: Install backend deps & build
        run: |
          cd backend
          cargo build --locked --release

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r ai_service/requirements.txt || true
        continue-on-error: true

      - name: Install frontend deps & Playwright browsers
        run: |
          cd frontend
          npm ci || npm install --no-audit --no-fund
          npx playwright install chromium

      - name: Start backend
        run: |
          cd backend
          PORT=8081 RUST_LOG=info cargo run --manifest-path Cargo.toml > backend.log 2>&1 &
          echo $! > backend.pid

      - name: Start AI microservice
        run: |
          python -u ai_service/main.py > ai_service.log 2>&1 &
          echo $! > ai_service.pid

      - name: Dump backend log (debug)
        if: always()
        run: |
          if [ -f backend/backend.log ]; then
            echo "--- backend log (tail 200) ---"
            sleep 1
            tail -n 200 backend/backend.log || true
            echo "--- end backend log ---"
          else
            echo "backend/backend.log not found"
          fi

      - name: Wait for services
        run: |
          echo "Waiting for backend..."
          for i in {1..30}; do
            if curl -sS http://localhost:8081/api/health | grep -q '"status"'; then
              echo "Backend ready" && break
            fi
            sleep 1
          done

      - name: Run Playwright tests (API + UI)
        working-directory: frontend
        env:
          API_BASE: http://localhost:8081/api
        run: |
          npx playwright test --project=chromium --reporter=dot

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report || true

      - name: Tear down services
        if: always()
        run: |
          if [ -f backend.pid ]; then kill $(cat backend.pid) || true; fi
          if [ -f ai_service.pid ]; then kill $(cat ai_service.pid) || true; fi
