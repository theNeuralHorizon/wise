services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    env_file: .env.production
    volumes:
      - wise-data:/home/wise
    networks:
      - wise-internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  ai_service:
    build:
      context: ./ai_service
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env.production
    networks:
      - wise-internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
        VITE_WS_BASE_URL: ""
        VITE_FRONTEND_URL: ""
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
      ai_service:
        condition: service_healthy
    networks:
      - wise-internal

networks:
  wise-internal:
    driver: bridge

volumes:
  wise-data:
    driver: local
