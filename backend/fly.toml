app = 'wise-api'
primary_region = 'iad'

[build]

[http_service]
  internal_port = 8081
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 250
    soft_limit = 200

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1

[env]
  HOST = '0.0.0.0'
  PORT = '8081'
  RUST_LOG = 'wise_server=info,tower_http=info,sqlx=warn'
